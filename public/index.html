<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>AI Cohost</title>
    <link rel='stylesheet' href='css/styles.css'>
</head>
<body>

<!-- Avatar rendering surface -->
<div id='avatar-container'></div>

<!-- Remote AI audio — srcObject is set by webrtc.js, never has a src attribute -->
<audio id='ai-audio' autoplay playsinline></audio>

<!-- Subtitle overlay: shown/hidden by webrtc.js DataChannel messages -->
<div id='subtitle-overlay' aria-live='polite'></div>

<!-- Thinking indicator: toggled when AG2 sends type=thinking -->
<div id='thinking-indicator' aria-live='polite'>Thinking&hellip;</div>

<!--
  Optional runtime config — set window.COHOST_CONFIG before the scripts below
  to point at a remote signaling server:

  <script>
    window.COHOST_CONFIG = { signalingBaseUrl: 'http://192.168.1.100:3000' };
  </script>
-->

<!--
  Import map: maps bare module specifiers used inside talkinghead.mjs
  to CDN URLs. No local copy of TalkingHead or Three.js is required.
  Avatar.js imports TalkingHead and HeadAudio directly via these mappings.
-->
<script type='importmap'>
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "talkinghead":    "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/modules/talkinghead.mjs"
  }
}
</script>

<!--
  ag2client — AG2 WebRTC browser library (global: ag2client.WebRTC)
  Handles WebSocket /session signaling + RTCPeerConnection to OpenAI.
  Must load BEFORE webrtc.js.
  https://github.com/ag2ai/ag2-js-client
-->
<script src='https://github.com/ag2ai/ag2-js-client/releases/download/v0.2.0/index.global.js'></script>

<!--
  All scripts are ES modules (deferred by default).
  Execution order is document order, which guarantees:
    1. avatar.js  — defines window.initAvatar + window.setupHeadAudio
    2. webrtc.js  — defines window.initWebRTC
    3. main.js    — calls both after DOM is ready
-->
<script type='module' src='js/avatar.js'></script>
<script type='module' src='js/webrtc.js'></script>
<script type='module' src='js/main.js'></script>

</body>
</html>
